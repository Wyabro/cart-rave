<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart Rave</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <script>
    (function() {
      var h = window.location.hostname;
      var isLocal = h === "localhost" || h === "127.0.0.1" || /^192\.168\./.test(h) || /^10\./.test(h) || /^172\.(1[6-9]|2[0-9]|3[0-1])\./.test(h);
      if (isLocal) {
        var s = document.createElement("script");
        s.src = "https://cdn.jsdelivr.net/npm/eruda";
        s.onload = function() { eruda.init(); };
        document.head.appendChild(s);
      }
    })();
  </script>
  <script async src="https://vibej.am/2026/widget.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
  <!-- Step 10b: Menu fonts and critical CSS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Space+Mono:wght@400;700&family=Archivo+Black&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="cart-rave-menu.css">
  <style>
    /* Step 10d: Volume and Mute Controls */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-track {
      background: #444;
      height: 4px;
      border-radius: 2px;
    }

    input[type="range"]::-moz-range-track {
      background: #444;
      height: 4px;
      border-radius: 2px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      background: #2bd6ff;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      margin-top: -6px;
      box-shadow: 0 0 5px #2bd6ff;
    }

    input[type="range"]::-moz-range-thumb {
      background: #2bd6ff;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: none;
      box-shadow: 0 0 5px #2bd6ff;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "partysocket": "https://esm.sh/partysocket@1.1.16"
      }
    }
  </script>
</head>
<body>
  <div class="cr-root" id="cr-root">
    <!-- Background layers -->
    <div class="cr-floor" id="cr-floor">
      <div class="cr-floor-grid" id="cr-floor-grid"></div>
    </div>
    <div class="cr-lights" id="cr-lights"></div>
    <div class="cr-vignette"></div>
    <div class="cr-particles" id="cr-particles"></div>
    <div class="cr-scan" id="cr-scan"></div>

    <!-- Main content -->
    <div class="cr-content">
      <!-- Left column -->
      <div class="cr-left">
        <a class="cr-portal" id="cr-portal" href="https://vibej.am/portal/2026">
          <div class="cr-portal-swirl"></div>
          <span class="cr-portal-label">ENTER PORTAL</span>
        </a>
        <div class="cr-cart-stage">
          <div class="cr-cart-shadow" id="cr-cart-shadow"></div>
          <div id="cr-cart-holder"></div>
        </div>
        <div class="cr-stats" id="cr-stats-local">
          <div class="cr-stat">
            <span class="cr-stat-num" id="stat-wins">12</span>
            <span class="cr-stat-lbl">WINS</span>
          </div>
          <div class="cr-stat-div"></div>
          <div class="cr-stat">
            <span class="cr-stat-num" id="stat-played">47</span>
            <span class="cr-stat-lbl">PLAYED</span>
          </div>
          <div class="cr-stat-div"></div>
          <div class="cr-stat">
            <span class="cr-stat-num" id="stat-pts">3,840</span>
            <span class="cr-stat-lbl">POINTS</span>
          </div>
        </div>

        <div class="cr-stats cr-stats-global">
          <div class="cr-stats-tag">
            <i class="cr-pulse" style="background:#2bff7a"></i> GLOBAL
          </div>
          <div class="cr-stat">
            <span class="cr-stat-num" id="stat-online">2,431</span>
            <span class="cr-stat-lbl">CARTS ONLINE</span>
          </div>
          <div class="cr-stat-div"></div>
          <div class="cr-stat">
            <span class="cr-stat-num" id="stat-plays">1,847,293</span>
            <span class="cr-stat-lbl">TOTAL PLAYS</span>
          </div>
        </div>
      </div>

      <!-- Center column -->
      <div class="cr-center">
        <div class="cr-tagline">
          <span>◆</span>
          <span>SHOPPING CART ARENA</span>
          <span>◆</span>
        </div>
        <h1 class="cr-title cr-title-stack" id="cr-title">
          <span class="cr-title-word">CART</span>
          <span class="cr-title-word">RAVE</span>
        </h1>

        <div class="cr-buttons">
          <button class="cr-btn" data-action="solo" data-colorkey="primary">
            <span class="cr-btn-inner"><span class="cr-btn-label">SOLO</span></span>
            <span class="cr-btn-corner tl"></span><span class="cr-btn-corner tr"></span>
            <span class="cr-btn-corner bl"></span><span class="cr-btn-corner br"></span>
          </button>
          <button class="cr-btn" data-action="quickplay" data-colorkey="secondary">
            <span class="cr-btn-inner"><span class="cr-btn-label">QUICKPLAY</span></span>
            <span class="cr-btn-corner tl"></span><span class="cr-btn-corner tr"></span>
            <span class="cr-btn-corner bl"></span><span class="cr-btn-corner br"></span>
          </button>
          <button class="cr-btn" data-action="friends" data-colorkey="tertiary">
            <span class="cr-btn-inner"><span class="cr-btn-label">FRIENDS</span></span>
            <span class="cr-btn-corner tl"></span><span class="cr-btn-corner tr"></span>
            <span class="cr-btn-corner bl"></span><span class="cr-btn-corner br"></span>
          </button>
        </div>
      </div>

      <!-- Right column -->
      <div class="cr-right">
        <div class="cr-player-card" id="cr-player-card">
          <div class="cr-player-hd">
            <span>◇ YOUR CART</span>
            <span class="cr-player-status">
              <i class="cr-pulse" style="background:#2bff7a"></i> ONLINE
            </span>
          </div>

          <div class="cr-name-row">
            <div class="cr-name-display" id="cr-name-display">
              <span class="cr-tag">@</span><span id="cr-name-text">BASSLORD42</span>
              <span class="cr-edit-hint">✎</span>
            </div>
            <input class="cr-name-input" id="cr-name-input" style="display:none" maxlength="12" />
            <button class="cr-reroll" id="cr-reroll" title="Re-roll handle">⟲</button>
          </div>

          <div class="cr-color-label">CHOOSE COLOR</div>
          <div class="cr-color-row" id="cr-color-row"></div>
        </div>

        <!-- Audio widget -->
        <div class="cr-audio" id="cr-audio">
          <button class="cr-mute-btn" id="cr-mute-btn" title="Mute">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 5 6 9H3v6h3l5 4z"/>
              <path d="M15.5 8.5a5 5 0 0 1 0 7"/>
              <path d="M18.5 5.5a9 9 0 0 1 0 13"/>
            </svg>
          </button>
          <div class="cr-vol-track" id="cr-vol-track">
            <div class="cr-vol-fill" id="cr-vol-fill"></div>
          </div>
          <span class="cr-vol-val" id="cr-vol-val">60</span>
        </div>

        <!-- Controls reference -->
        <div class="cr-controls" id="cr-controls">
          <div class="cr-controls-hd">
            <span>◇ CONTROLS</span>
            <span style="opacity:.4">KEYBOARD</span>
          </div>
          <div class="cr-ctl-row">
            <span class="cr-ctl-keys" id="ctl-wasd">
              <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd>
            </span>
            <span class="cr-ctl-lbl">Move Cart</span>
          </div>
          <div class="cr-ctl-row">
            <span class="cr-ctl-keys" id="ctl-shift"><kbd class="wide">SHIFT</kbd></span>
            <span class="cr-ctl-lbl">Boost Cart</span>
          </div>
          <div class="cr-ctl-row">
            <span class="cr-ctl-keys" id="ctl-space"><kbd class="wide">SPACE</kbd></span>
            <span class="cr-ctl-lbl">Honk Horn</span>
          </div>
          <div class="cr-ctl-row">
            <span class="cr-ctl-keys" id="ctl-m"><kbd>M</kbd></span>
            <span class="cr-ctl-lbl">Mute Audio</span>
          </div>
        </div>
      </div>
    </div>
  </div>
  <canvas id="game"></canvas>
  <script type="module" src="main.js?v=dev"></script>
  <script src="cart-rave-menu.js"></script>
</body>
</html>
