<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart Rave</title>
  <script>
    (function() {
      var h = window.location.hostname;
      var isLocal = h === "localhost" || h === "127.0.0.1" || /^192\.168\./.test(h) || /^10\./.test(h) || /^172\.(1[6-9]|2[0-9]|3[0-1])\./.test(h);
      if (isLocal) {
        var s = document.createElement("script");
        s.src = "https://cdn.jsdelivr.net/npm/eruda";
        s.onload = function() { eruda.init(); };
        document.head.appendChild(s);
      }
    })();
  </script>
  <script async src="https://vibej.am/2026/widget.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
  <!-- Step 10b: Menu fonts and critical CSS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
  <style>
    /* Menu container */
    #menu {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #070010 0%, #1a0033 50%, #070010 100%);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Bungee', cursive;
      color: white;
      overflow: hidden;
      transition: opacity 0.3s ease; /* Added for smooth fade out */
    }

    /* Animated SVG background */
    #menu-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.15;
      pointer-events: none;
    }

    /* Title */
    .menu-title {
      font-size: 5rem;
      margin-bottom: 1rem;
      text-align: center;
      text-shadow: 
        0 0 10px #ff2bd6,
        0 0 20px #ff2bd6,
        0 0 30px #ff2bd6;
      letter-spacing: 0.1em;
      position: relative;
      z-index: 1;
    }

    .menu-subtitle {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      color: #2bd6ff;
      text-shadow: 0 0 5px #2bd6ff;
      letter-spacing: 0.2em;
      position: relative;
      z-index: 1;
    }


    /* Button container */
    .menu-buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      position: relative;
      z-index: 1;
    }

    /* Button styles */
    .menu-button {
      font-family: 'Bungee', cursive;
      font-size: 1.8rem;
      padding: 1rem 3rem;
      background: transparent;
      border: 3px solid;
      border-radius: 0;
      color: white;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      position: relative;
      overflow: hidden;
    }

    .menu-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transition: left 0.5s ease;
    }

    .menu-button:hover::before {
      left: 100%;
    }

    .menu-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 15px currentColor;
    }

    .menu-button:active {
      transform: translateY(0);
    }

    /* Individual button colors */
    .menu-button-solo {
      border-color: #8dff2b;
      color: #8dff2b;
    }

    .menu-button-quickplay {
      border-color: #2bd6ff;
      color: #2bd6ff;
    }

    .menu-button-friends {
      border-color: #ffee00;
      color: #ffee00;
    }

    .menu-button-vibejam {
      border-color: #ff2bd6;
      color: #ff2bd6;
    }

    /* Step 10d: Volume and Mute Controls */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-track {
      background: #444;
      height: 4px;
      border-radius: 2px;
    }

    input[type="range"]::-moz-range-track {
      background: #444;
      height: 4px;
      border-radius: 2px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      background: #2bd6ff;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      margin-top: -6px;
      box-shadow: 0 0 5px #2bd6ff;
    }

    input[type="range"]::-moz-range-thumb {
      background: #2bd6ff;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: none;
      box-shadow: 0 0 5px #2bd6ff;
    }

    /* Footer */
    .menu-footer {
      position: absolute;
      bottom: 2rem;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.9rem;
      color: #888;
      text-align: center;
      width: 100%;
      z-index: 1;
    }

    /* Color Picker */
    .color-picker-container {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      position: relative;
      z-index: 1;
    }

    .color-dot {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
    }

    .color-dot:hover {
      transform: scale(1.1);
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
    }

    .color-dot.selected {
      border: 2px solid white;
      box-shadow: 0 0 15px white;
    }

    /* HUD Color Classes */
    .bg-pink       { background-color: #ff00ff !important; color: black !important; }
    .bg-blue       { background-color: #00ffff !important; color: black !important; }
    .bg-green      { background-color: #00ff00 !important; color: black !important; }
    .bg-yellow     { background-color: #ffff00 !important; color: black !important; }
    .bg-neonOrange { background-color: #ff6600 !important; color: black !important; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "partysocket": "https://esm.sh/partysocket@1.1.16"
      }
    }
  </script>
</head>
<body>
  <canvas id="game"></canvas>
  <script type="module" src="main.js?v=dev"></script>
</body>
</html>
